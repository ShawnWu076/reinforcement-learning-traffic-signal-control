environment:
  network_type: 2x2
  grid_shape: [2, 2]
  intersection_ids: ["A", "B", "C", "D"]
  train_schedule_name: grid_balanced
  episode_length: 240
  step_seconds: 3
  min_green_time: 2
  yellow_time: 1
  max_departures_per_step: 4
  recent_arrival_window: 5
  observation_variant: full
  reward_mode: queue
  switch_penalty: 1.5
  train_schedule:
    - until_step: 240
      rates:
        A: {"N": 0.6, "W": 0.6}
        B: {"N": 0.6, "E": 0.6}
        C: {"S": 0.6, "W": 0.6}
        D: {"S": 0.6, "E": 0.6}
  evaluation_regimes:
    grid_balanced_low:
      - until_step: 240
        rates:
          A: {"N": 0.4, "W": 0.4}
          B: {"N": 0.4, "E": 0.4}
          C: {"S": 0.4, "W": 0.4}
          D: {"S": 0.4, "E": 0.4}
    grid_balanced_high:
      - until_step: 240
        rates:
          A: {"N": 0.9, "W": 0.9}
          B: {"N": 0.9, "E": 0.9}
          C: {"S": 0.9, "W": 0.9}
          D: {"S": 0.9, "E": 0.9}
    east_west_commute:
      - until_step: 240
        rates:
          A: {"N": 0.4, "W": 1.1}
          B: {"N": 0.4, "E": 0.4}
          C: {"S": 0.4, "W": 1.1}
          D: {"S": 0.4, "E": 0.4}
    north_south_commute:
      - until_step: 240
        rates:
          A: {"N": 1.1, "W": 0.4}
          B: {"N": 1.1, "E": 0.4}
          C: {"S": 0.4, "W": 0.4}
          D: {"S": 0.4, "E": 0.4}
    grid_nonstationary:
      - until_step: 80
        rates:
          A: {"N": 0.4, "W": 0.4}
          B: {"N": 0.4, "E": 0.4}
          C: {"S": 0.4, "W": 0.4}
          D: {"S": 0.4, "E": 0.4}
      - until_step: 160
        rates:
          A: {"N": 0.5, "W": 1.2}
          B: {"N": 0.5, "E": 0.5}
          C: {"S": 0.5, "W": 1.2}
          D: {"S": 0.5, "E": 0.5}
      - until_step: 240
        rates:
          A: {"N": 0.8, "W": 0.6}
          B: {"N": 0.8, "E": 0.6}
          C: {"S": 0.6, "W": 0.6}
          D: {"S": 0.6, "E": 0.6}

training:
  episodes: 300
  gamma: 0.99
  learning_rate: 0.0005
  batch_size: 128
  buffer_size: 80000
  hidden_dims: [256, 256]
  start_epsilon: 1.0
  end_epsilon: 0.05
  epsilon_decay_steps: 30000
  warmup_steps: 800
  update_frequency: 1
  target_sync_steps: 300
  seed: 13
  log_interval_episodes: 25

evaluation:
  episodes_per_regime: 20

tuning:
  search_type: random
  seed: 17
  max_trials: 10
  fixed_overrides:
    training.episodes: 180
    training.warmup_steps: 500
    evaluation.episodes_per_regime: 10
  objective:
    regime: grid_nonstationary
    policy: dqn
    metric: average_wait_time_seconds
    mode: min
  search_space:
    training.learning_rate: [0.001, 0.0005, 0.0002]
    training.gamma: [0.97, 0.99]
    training.batch_size: [64, 128]
    training.hidden_dims:
      - [128, 128]
      - [256, 256]
    environment.switch_penalty: [0.5, 1.5, 3.0]
