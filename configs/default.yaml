environment:
  episode_length: 200
  step_seconds: 3
  min_green_time: 2
  yellow_time: 1
  max_departures_per_step: 4
  recent_arrival_window: 5
  reward_mode: queue
  switch_penalty: 2.0
  train_schedule:
    - until_step: 120
      rates:
        N: 0.8
        S: 0.8
        E: 0.8
        W: 0.8
    - until_step: 200
      rates:
        N: 0.7
        S: 0.7
        E: 1.1
        W: 1.1
  evaluation_regimes:
    symmetric_low:
      - until_step: 200
        rates:
          N: 0.5
          S: 0.5
          E: 0.5
          W: 0.5
    symmetric_high:
      - until_step: 200
        rates:
          N: 1.2
          S: 1.2
          E: 1.2
          W: 1.2
    asymmetric:
      - until_step: 200
        rates:
          N: 0.5
          S: 0.5
          E: 1.4
          W: 1.4
    nonstationary:
      - until_step: 80
        rates:
          N: 0.4
          S: 0.4
          E: 0.4
          W: 0.4
      - until_step: 140
        rates:
          N: 0.9
          S: 0.9
          E: 1.3
          W: 1.3
      - until_step: 200
        rates:
          N: 0.6
          S: 0.6
          E: 1.0
          W: 1.0
    burst_east_west:
      - until_step: 70
        rates:
          N: 0.7
          S: 0.7
          E: 0.7
          W: 0.7
      - until_step: 100
        rates:
          N: 0.7
          S: 0.7
          E: 2.0
          W: 2.0
      - until_step: 200
        rates:
          N: 0.7
          S: 0.7
          E: 0.8
          W: 0.8

training:
  episodes: 250
  gamma: 0.99
  learning_rate: 0.001
  batch_size: 64
  buffer_size: 50000
  hidden_dims: [128, 128]
  start_epsilon: 1.0
  end_epsilon: 0.05
  epsilon_decay_steps: 20000
  warmup_steps: 500
  update_frequency: 1
  target_sync_steps: 250
  seed: 7

evaluation:
  episodes_per_regime: 20
